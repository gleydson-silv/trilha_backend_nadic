{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CRM{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'users/store.css' %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="container topbar__inner">
          <div class="brand">
            <span class="brand__logo"></span>
            <strong class="brand__name">FlowCRM</strong>
          </div>
          <nav class="nav">
            {% block nav %}
            <a href="#">Novidades</a>
            <a href="#">Coleções</a>
            <a href="#">Acessórios</a>
            <a href="#">Sobre</a>
            {% endblock %}
          </nav>
          <div class="topbar__actions">
            {% block header_actions %}
            <button class="btn btn--ghost">Entrar</button>
            <button class="btn">Comprar</button>
            {% endblock %}
          </div>
        </div>
      </header>

      <main>
        {% block content %}{% endblock %}
      </main>

      <footer class="footer">
        <div class="container footer__inner">
          <div>
            <strong>FlowCRM</strong>
            <p class="muted">Design atemporal para uma vida moderna.</p>
          </div>
          <div class="footer__links">
            <a href="#">Suporte</a>
            <a href="#">Entregas</a>
            <a href="#">Trocas</a>
            <a href="#">Contato</a>
          </div>
        </div>
      </footer>
    </div>
    <script src="{% static 'users/app.js' %}"></script>
  </body>
</html>
